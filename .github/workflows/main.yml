name: ETL Pipeline Flows

on:
  push:
    branches: [ "main" ]

jobs:
  extract-data-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run extract_data.py
        run: python extract_data.py 

      - name: Upload Raw Data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: raw_data.csv

  transform-data-job:
    needs: extract-data-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Download Raw Data
        uses: actions/download-artifact@v4
        with:
          name: raw-data

      - name: Run transform_data.py
        run: python transform_data.py

      - name: Upload Transformed Data
        uses: actions/upload-artifact@v4
        with:
          name: transformed-data
          path: transformed_data.csv

  load-data-job:
    needs: transform-data-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Transformed Data
        uses: actions/download-artifact@v4
        with:
          name: transformed-data

      - name: Run load_data.py
        run: python load_data.py

      - name: print
        run: echo "hello"