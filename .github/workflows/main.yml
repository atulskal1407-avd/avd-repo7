name: etl pipeline
on:
  push:
    branches:
      - main

jobs:
  extract-data-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Check files are present
        run: ls -la
      - name: Run extract_data.py
        working-directory: .
        run: python extract_data.py
        
  transform-data-job:
    needs: extract-data-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Check files are present
        run: ls -la
      - name: Run transform_data.py
        working-directory: .
        run: python transform_data.py
        
  load-data-job:
    needs: transform-data-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Check files are present
        run: ls -la
      - name: Run load_data.py
        working-directory: .
        run: python load_data.py