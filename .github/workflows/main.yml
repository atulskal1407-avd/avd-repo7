name: ETL Pipeline

on: [push]

jobs:
  extract-data-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path:.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check files are present
        run: ls -la

      - name: Run extract_data.py
        run: python extract_data.py

  transform-data-job:
    runs-on: ubuntu-latest
    needs: extract-data-job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path:.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check files are present
        run: ls -la

      - name: Run transform_data.py
        run: python transform_data.py

  load-data-job:
    runs-on: ubuntu-latest
    needs: transform-data-job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path:.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check files are present
        run: ls -la

      - name: Run load_data.py
        run: python load_data.py